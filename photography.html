<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Photography</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: var(--background-color, #2c2f33);
    }

    main {
      padding: 40px 20px;
    }

    .photo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      max-width: 1200px;
      margin: 0 auto 40px auto;
    }

    .photo-container {
      background-color: #fff;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }

    .photo-container blockquote.instagram-media {
      border-radius: 12px;
      overflow: hidden;
    }

    .google-photos-link {
      display: block;
      text-align: center;
      margin-top: 10px;
      font-weight: 600;
      color: #1a73e8;
      text-decoration: none;
      font-size: 16px;
    }

    .google-photos-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <body>
  <div class="container center">
    <h1>📸 Photography</h1>
    <p>This is the photography page. Content coming soon!</p>
    <a href="index.html" class="nav-button">← Back Home</a>
  </div>
  </body>
  
  <main>
    <!-- First Row -->
