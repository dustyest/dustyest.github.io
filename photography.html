<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Photography</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    :root {
      --background-color: #2c2f33;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: var(--background-color);
    }

    main {
      padding: 40px 20px;
    }

    h1, p {
      text-align: center;
      color: #fff;
    }

    .photo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      max-width: 1200px;
      margin: 0 auto 40px;
    }

    .photo-container {
      background-color: #fff;
      border-radius: 12px;
      padding: 0;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      overflow: hidden;
    }

    .instagram-media {
      width: 100% !important;
      min-width: 0 !important;
      max-width: 100% !important;
      margin: 0 auto !important;
    }

    .google-photos-link {
      display: block;
      text-align: center;
      margin: 40px auto;
      font-weight: 600;
      color: #1a73e8;
      text-decoration: none;
      font-size: 16px;
    }

    .google-photos-link:hover {
      text-decoration: underline;
    }

    .container.centerr {
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      min-height: 100vh;
      padding-top: 2rem;
    }

    @media (max-width: 600px) {
      .photo-grid {
        grid-template-columns: 1fr;
        gap: 16px;
        padding: 0 10px;
      }

      .google-photos-link {
        font-size: 14px;
        margin: 20px 0;
      }

      h1 {
        font-size: 1.6rem;
        padding: 0 10px;
      }

      p {
        padding: 0 10px;
      }
    }
  </style>
</head>
<body>
  <div class="container centerr">
    <h1>📸 Photography</h1>
    <p>This is the photography page. Description coming soon!</p>
    <a href="index.html" class="google-photos-link">← Back Home</a>
  </div>

  <main>
    <!-- Row 1 -->
    <div class="photo-grid">
      <div class="photo-container">
        <blockquote class="instagram-media" data-instgrm-permalink="https://www.instagram.com/p/DKTZOPyAnY3/" data-instgrm-version="14"></blockquote>
      </div>
      <div class="photo-container">
        <blockquote class="instagram-media" data-instgrm-permalink="https://www.instagram.com/p/DKTYsGOgSPx/" data-instgrm-version="14"></blockquote>
      </div>
      <div class="photo-container">
        <blockquote class="instagram-media" data-instgrm-permalink="https://www.instagram.com/p/DKTXatNgBwU/" data-instgrm-version="14"></blockquote>
      </div>
    </div>

    <a href="https://photos.app.goo.gl/KmGmwzn1vddf8B8RA" target="_blank" rel="noopener noreferrer" class="google-photos-link">
      ⬆️ View the full photography album on Google Photos ⬆️
    </a>

    <!-- Row 2 -->
    <div class="photo-grid">
      <div class="photo-container">
        <blockquote class="instagram-media" data-instgrm-permalink="https://www.instagram.com/p/DKDnEZXP0sy/" data-instgrm-version="14"></blockquote>
      </div>
      <div class="photo-container">
        <blockquote class="instagram-media" data-instgrm-permalink="https://www.instagram.com/p/DG1blrdvht_/" data-instgrm-version="14"></blockquote>
      </div>
      <div class="photo-container">
        <blockquote class="instagram-media" data-instgrm-permalink="https://www.instagram.com/p/DCnXpvTOhcd/" data-instgrm-version="14"></blockquote>
      </div>
    </div>

    <!-- Misc Links -->
    <div class="photo-grid">
      <a href="https://photos.app.goo.gl/aMUy22HEUuNrvJqL6" target="_blank" rel="noopener noreferrer" class="google-photos-link">View the full photography album on Google Photos</a>
      <a href="https://dustyest.github.io/photography.html" target="_blank" rel="noopener noreferrer" class="google-photos-link">No Link for this Album ;(</a>
      <a href="https://dustyest.github.io/photography.html" target="_blank" rel="noopener noreferrer" class="google-photos-link">No Link for this Album ;(</a>
    </div>

    <!-- Footer Note -->
    <a href="https://dustyest.github.io/photography.html" target="_blank" rel="noopener noreferrer" class="google-photos-link">Enter Footer Note HERE!</a>
  </main>

  <!-- Instagram embed script -->
  <script async src="//www.instagram.com/embed.js"></script>
</body>
</html>
