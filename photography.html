<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Photography</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    :root {
      --background-color: #2c2f33;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: var(--background-color);
      color: #fff;
    }

    h1 {
      text-align: center;
      margin-top: 1rem;
    }

    main {
      padding: 40px 20px;
    }

    .photo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      max-width: 1200px;
      margin: 0 auto 40px auto;
    }

    .photo-container {
      background-color: #fff;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }

    .instagram-media {
      max-width: 100% !important;
      width: 100% !important;
      border-radius: 12px !important;
    }

    .google-photos-link {
      display: block;
      text-align: center;
      margin: 40px auto 10px;
      font-weight: 600;
      color: #1a73e8;
      text-decoration: none;
      font-size: 16px;
    }

    .google-photos-link:hover {
      text-decoration: underline;
    }

    .container.centerr {
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      min-height: 100vh;
      padding-top: 2rem;
      text-align: center;
    }

    .nav-button {
      margin-top: 1rem;
      text-decoration: none;
      background-color: #7289da;
      color: white;
      padding: 10px 20px;
      border-radius: 6px;
      font-weight: bold;
    }

    .nav-button:hover {
      background-color: #5b6eae;
    }

    @media (max-width: 600px) {
      main {
        padding: 20px 10px;
      }

      .google-photos-link {
        font-size: 14px;
        margin: 20px auto 10px;
      }

      h1 {
        font-size: 1.5rem;
      }

      p {
        font-size: 1rem;
        padding: 0 10px;
      }

      .nav-button {
        padding: 8px 16px;
      }
    }
  </style>
</head>
<body>
  <div class="container centerr">
    <h1>📸 Photography</h1>
    <p>This is the photography page. Description coming soon!</p>
    <a href="index.html" class="nav-button">← Back Home</a>
  </div>

  <main>
    <!-- First Row -->
    <div class="photo-grid">
      <div class="photo-container">
        <blockquote class="instagram-media" data-instgrm-permalink="https://www.instagram.com/p/DKTZOPyAnY3/" data-instgrm-version="14"></blockquote>
      </div>
      <div class="photo-container">
        <blockquote class="instagram-media" data-instgrm-permalink="https://www.instagram.com/p/DKTYsGOgSPx/" data-instgrm-version="14"></blockquote>
      </div>
      <div class="photo-container">
        <blockquote class="instagram-media" data-instgrm-permalink="https://www.instagram.com/p/DKTXatNgBwU/" data-instgrm-version="14"></blockquote>
      </div>
    </div>

    <a href="https://photos.app.goo.gl/KmGmwzn1vddf8B8RA" target="_blank" rel="noopener noreferrer" class="google-photos-link">
      ⬆️ View the full photography album on Google Photos ⬆️
    </a>

    <!-- Second Row -->
    <div class="photo-grid">
      <div class="photo-container">
        <blockquote class="instagram-media" data-instgrm-permalink="https://www.instagram.com/p/DKDnEZXP0sy/" data-instgrm-version="14"></blockquote>
      </div>
      <div class="photo-container">
        <blockquote class="instagram-media" data-instgrm-permalink="https://www.instagram.com/p/DG1blrdvht_/" data-instgrm-version="14"></blockquote>
      </div>

        <blockquote class="instagram-media" data-instgrm-permalink="https://www.instagram.com/p/DCnXpvTOhcd/" data-instgrm-version="14"></blockquote>
      </div>
    </div>

    <!-- More Links -->
    <div class="photo-grid">
      <a href="https://photos.app.goo.gl/aMUy22HEUuNrvJqL6" target="_blank" rel="noopener noreferrer" class="google-photos-link">
        View the full photography album on Google Photos
      </a>

      <a href="https://dustyest.github.io/photography.html" target="_blank" rel="noopener noreferrer" class="google-photos-link">
        No Link for this Album ;(

      <a href="https://dustyest.github.io/photography.html" target="_blank" rel="noopener noreferrer" class="google-photos-link">
        No Link for this Album ;(
      </a>
    </div>

    <a href="https://dustyest.github.io/photography.html" target="_blank" rel="noopener noreferrer" class="google-photos-link">
      Enter Footer Note HERE!

  </main>

  <!-- Instagram embed script -->
  <script async src="//www.instagram.com/embed.js"></script>
</body>
</html>
