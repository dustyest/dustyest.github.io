<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Photography</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* Rounded corner rectangle container */
    .photo-container {
      background-color: #ffffff; /* or any background color */
      border-radius: 12px;
      padding: 20px;
      max-width: 400px; /* adjust as needed */
      margin: 20px auto;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }

    /* Instagram embed inside container */
    .photo-container blockquote.instagram-media {
      border-radius: 12px; /* match container */
      overflow: hidden;    /* clip corners inside */
    }

    /* Google Photos link styling */
    .google-photos-link {
      display: block;
      text-align: center;
      margin-top: 12px;
      font-weight: 600;
      color: #1a73e8; /* Google blue */
      text-decoration: none;
      font-size: 16px;
    }

    .google-photos-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <main>
    <section class="photo-container">
      <!-- Your Instagram embed blockquote here -->
      <blockquote
        class="instagram-media"
        data-instgrm-permalink="https://www.instagram.com/p/your_post_id/"
        data-instgrm-version="14"
        style=" background:#FFF; border:0; margin:0 auto; max-width:400px; min-width:326px; padding:0; width:100%; border-radius:12px; overflow:hidden;"
      >
        <div style="padding:16px;">
          <!-- Instagram embed contents -->
        </div>
      </blockquote>
      <script async src="//www.instagram.com/embed.js"></script>
    </section>

    <!-- Google Photos link below the container -->
    <a
      href="https://photos.google.com/your_album_link"
      target="_blank"
      rel="noopener noreferrer"
      class="google-photos-link"
    >
      View my full photography album on Google Photos
    </a>
  </main>
</body>
</html>
