<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Photography | rshn</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #fff;
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
    }
    .container {
      max-width: 600px;
      width: 100%;
      text-align: center;
    }
    h1 {
      font-size: 2rem;
      margin-bottom: 1rem;
    }
    .post-box {
      border: 2px solid #ddd;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 20px;
      box-shadow: 0 0 8px rgba(0,0,0,0.1);
    }
    .google-photos-link {
      margin-top: 10px;
      background: #f7f7f7;
      padding: 10px;
      border-radius: 6px;
      font-size: 1rem;
    }
    .google-photos-link a {
      color: #0077cc;
      text-decoration: none;
      font-weight: bold;
    }
    .nav-button {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 15px;
      background: #0077cc;
      color: white;
      border-radius: 4px;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📸 Photography</h1>

    <div class="post-box">
      <!-- Instagram embed -->
      <blockquote class="instagram-media" data-instgrm-captioned data-instgrm-permalink="https://www.instagram.com/p/DKTXatNgBwU/?utm_source=ig_embed&amp;utm_campaign=loading" data-instgrm-version="14" style=" background:#FFF; border:0; border-radius:3px; box-shadow:0 0 1px 0 rgba(0,0,0,0.5),0 1px 10px 0 rgba(0,0,0,0.15); margin: 1px auto; max-width:540px; min-width:326px; padding:0; width:99.375%; width:-webkit-calc(100% - 2px); width:calc(100% - 2px);">
        <div style="padding:16px;">
          <a href="https://www.instagram.com/p/DKTXatNgBwU/?utm_source=ig_embed&amp;utm_campaign=loading" style="background:#FFFFFF; line-height:0; padding:0; text-align:center; text-decoration:none; width:100%;" target="_blank" rel="noopener noreferrer">
            View this post on Instagram
          </a>
        </div>
      </blockquote>
      <script async src="//www.instagram.com/embed.js"></script>

      <!-- Google Photos link below -->
      <div class="google-photos-link">
        <a href="https://photos.app.goo.gl/KmGmwzn1vddf8B8RA" target="_blank" rel="noopener noreferrer">
          View this photo on Google Photos →
        </a>
      </div>
    </div>

    <a href="index.html" class="nav-button">← Back Home</a>
  </div>
</body>
</html>
