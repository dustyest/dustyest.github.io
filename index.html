
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Status</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <div class="profile-card">
      <img class="avatar" src="profile.jpg" alt="Profile Picture">
      <div class="user-info">
        <h2>@yourname</h2>
        <span class="status" id="status-dot">● Loading...</span>
      </div>

      <div class="activity">
        <h3>🎬 Watching</h3>
        <p id="watching">Loading...</p>
      </div>

      <div class="activity">
        <h3>🎮 Playing</h3>
        <p id="playing">Loading...</p>
      </div>

      <div class="activity">
        <h3>📱 On</h3>
        <p id="social">Loading...</p>
      </div>

      <div class="activity">
        <h3>💤 Status</h3>
        <p id="customStatus">Loading...</p>
      </div>
    </div>
    <p class="footer">Last updated: <span id="timestamp">Loading...</span></p>
  </div>

  <script src="script.js"></script>
</body>
</html>
