<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Status</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Open Graph Meta Tags -->
  <meta property="og:title" content="Live Status | dustyest">
  <meta property="og:description" content="Currently watching, playing, or vibing. Check what I'm up to right now.">
  <meta property="og:image" content="https://dustyest.github.io/preview.jpg">
  <meta property="og:url" content="https://dustyest.github.io">
  <meta property="og:type" content="website">

  <!-- Twitter Card Tags -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Live Status | dustyest">
  <meta name="twitter:description" content="Check what I'm watching, playing, or vibing to right now.">
  <meta name="twitter:image" content="https://dustyest.github.io/preview.jpg">

  <!-- Fonts and Styles -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <div class="profile-card">
      <img class="avatar" src="profile.jpg" alt="Profile Picture">
      <div class="user-info">
        <h2>@yourname</h2>
        <span class="status" id="status-dot">● Loading...</span>
      </div>

      <div class="activity">
        <h3>🎬 Watching</h3>
        <p id="watching">Loading...</p>
      </div>

      <div class="activity">
        <h3>🎮 Playing</h3>
        <p id="playing">Loading...</p>
      </div>

      <div class="activity">
        <h3>📱 On</h3>
        <p id="social">Loading...</p>
      </div>

      <div class="activity">
        <h3>💤 Status</h3>
        <p id="customStatus">Loading...</p>
      </div>
    </div>
    <p class="footer">Last updated: <span id="timestamp">Loading...</span></p>
  </div>

  <script src="script.js"></script>
</body>
</html>
